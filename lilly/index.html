<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" type="text/css" href="../style.css">
  <link rel="icon" type="image/png" href="../favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="shortcut icon" href="../favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="/MyWebSite" />
  <link rel="manifest" href="../site.webmanifest" />
</head>
<body>
  <div id="copy-tooltip">Copied!</div>

  <div id="player-container">
    <div id="player-left">
      <div class="custom-audio-player">
        <button id="play-button" aria-label="Pause">⏸</button>
        <span id="status-time">LIVE</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" />
      </div>

      <div id="TitleContainer">
        <div id="flexcontainer">
          <strong>Song:</strong>
          <div id="scroll-container">
            <div id="scroll-text">
              <span class="scroll-title">LOADING...</span>
              <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
              <span class="scroll-title">LOADING...</span>
              <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
              <span class="scroll-title">LOADING...</span>
              <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
              <span class="scroll-title">LOADING...</span>
              <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
              <span class="scroll-title">LOADING...</span>
              <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
              <span class="scroll-title">LOADING...</span>
              <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
              <span class="scroll-title">LOADING...</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <img id="albumart" src="../default-art.jpg" alt="Album Art" />
  </div>

  <audio id="audioplayer" autoplay preload="none">
    <source src="https://music.pixelhumble.com/lilly" type="audio/mpeg" />
  </audio>

  <script src="../songtitle.js"></script>
  <script>
    const audio = document.getElementById("audioplayer");
    const playBtn = document.getElementById("play-button");
    const volumeSlider = document.getElementById("volume-slider");

    // Initial volume
    audio.volume = 0.8;
    volumeSlider.value = audio.volume;

    // Play/pause logic
    playBtn.addEventListener("click", () => {
      if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
        playBtn.setAttribute("aria-label", "Pause");
      } else {
        audio.pause();
        playBtn.textContent = "▶️";
        playBtn.setAttribute("aria-label", "Play");
      }
    });

    // Volume control
    volumeSlider.addEventListener("input", () => {
      audio.volume = volumeSlider.value;
    });

    // Try to autoplay (required in some browsers on interaction)
    audio.play().catch(err => console.warn("Autoplay blocked:", err));
  </script>
</body>
</html>
