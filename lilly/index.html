<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lilly's Mix</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      href="../favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="shortcut icon" href="../favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Lilly's Mix" />
    <link rel="manifest" href="../site.webmanifest" />
  </head>
  <body class="lilly-player">
    <svg class="svg-filters" aria-hidden="true" focusable="false">
      <defs>
        <filter
          id="electric-turbulence"
          x="-30%"
          y="-30%"
          width="160%"
          height="160%"
          color-interpolation-filters="sRGB"
        >
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.014"
            numOctaves="2"
            seed="8"
            result="noise"
          >
            <animate
              attributeName="baseFrequency"
              dur="2.8s"
              values="0.014;0.022;0.01;0.014"
              repeatCount="indefinite"
            />
          </feTurbulence>
          <feDisplacementMap
            in="SourceGraphic"
            in2="noise"
            scale="5"
            xChannelSelector="R"
            yChannelSelector="G"
          />
        </filter>
      </defs>
    </svg>

    <div id="bg-blur" aria-hidden="true"></div>
    <div id="copy-tooltip">Copied!</div>

    <div id="startup-overlay">
      <div id="startup-message">Tap to listen</div>
      <div id="loading-spinner" class="hidden"></div>
    </div>

    <main id="player-container" class="player-card">
      <div class="electric-border" aria-hidden="true">
        <div class="electric-border__glow"></div>
        <div class="electric-border__arc"></div>
      </div>

      <div class="art-frame">
        <img id="albumart" src="../default-art.jpg" alt="Album art" crossorigin="anonymous" />
        <span class="live-badge"><span class="live-dot"></span>LIVE</span>
      </div>

      <div class="player-body">
        <p class="station-label">Lilly's Mix</p>
        <p id="track-artist">—</p>
        <h1 id="track-title">Loading…</h1>

        <div class="controls">
          <button id="play-button" aria-label="Play" class="icon-button">
            <svg id="icon-play" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg id="icon-pause" viewBox="0 0 24 24" aria-hidden="true" hidden>
              <path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z" />
            </svg>
          </button>

          <div class="volume-group">
            <button id="volume-button" aria-label="Mute" class="icon-button">
              <svg id="icon-volume" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 0 0-2.5-4.03v8.05a4.5 4.5 0 0 0 2.5-4.02zM14 3.23v2.06a7 7 0 0 1 0 13.74v2.06a9 9 0 0 0 0-17.82z"
                />
              </svg>
            </button>
            <input
              type="range"
              id="volume-slider"
              min="0"
              max="1"
              step="0.01"
              value="1"
              aria-label="Volume"
            />
          </div>
        </div>
      </div>
    </main>

    <audio id="audioplayer" preload="none" crossorigin="anonymous">
      <source
        src="https://music.elsewhere.moe/stream?sid=1"
        type="audio/mpeg"
      />
    </audio>

    <script src="../songtitle.js"></script>
    <script src="beat.js"></script>
    <script>
      const audio = document.getElementById("audioplayer");
      const playBtn = document.getElementById("play-button");
      const iconPlay = document.getElementById("icon-play");
      const iconPause = document.getElementById("icon-pause");
      const volumeBtn = document.getElementById("volume-button");
      const volumeSlider = document.getElementById("volume-slider");
      const overlay = document.getElementById("startup-overlay");
      const message = document.getElementById("startup-message");
      const spinner = document.getElementById("loading-spinner");
      const playerContainer = document.getElementById("player-container");

      audio.volume = 1;

      function setPlayingUI(playing) {
        iconPlay.hidden = playing;
        iconPause.hidden = !playing;
        playBtn.setAttribute("aria-label", playing ? "Pause" : "Play");
      }

      function fadeInUI() {
        overlay.classList.add("hidden");
        playerContainer.classList.add("visible");
      }

      function startStream() {
        message.classList.add("hidden");
        spinner.classList.add("visible");

        let timedOut = false;

        const fallbackTimer = setTimeout(() => {
          timedOut = true;
          spinner.classList.remove("visible");
          message.classList.remove("hidden");
          message.textContent = "Stream is offline";
          fadeInUI();
        }, 10000);

        audio
          .play()
          .then(() => {
            if (timedOut) return;
            clearTimeout(fallbackTimer);
            setPlayingUI(true);
            fadeInUI();
            window.lillyBeat?.start();
            window.lillyTheme?.setActive(true);
          })
          .catch((err) => {
            if (timedOut) return;
            clearTimeout(fallbackTimer);
            console.warn("Stream play failed:", err);
            spinner.classList.remove("visible");
            message.classList.remove("hidden");
            message.textContent = "Tap to try again";
          });
      }

      overlay.addEventListener("click", startStream);

      playBtn.addEventListener("click", () => {
        if (audio.paused) {
          startStream();
        } else {
          audio.pause();
          setPlayingUI(false);
          window.lillyBeat?.stop();
          window.lillyTheme?.setActive(false);
        }
      });

      volumeBtn.addEventListener("click", () => {
        audio.muted = !audio.muted;
        volumeSlider.value = audio.muted ? 0 : audio.volume || 1;
      });

      volumeSlider.addEventListener("input", () => {
        audio.volume = volumeSlider.value;
        audio.muted = audio.volume === 0;
      });

      setPlayingUI(false);
    </script>
  </body>
</html>
