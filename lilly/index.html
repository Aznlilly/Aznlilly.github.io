<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <link
      rel="icon"
      type="image/png"
      href="../favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="shortcut icon" href="../favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="/MyWebSite" />
    <link rel="manifest" href="../site.webmanifest" />
  </head>
  <body>
    <div id="copy-tooltip">Copied!</div>
    <div id="startup-overlay">
      <div id="startup-message">Click to start stream</div>
      <div id="loading-spinner" class="hidden"></div>
    </div>
    <div id="player-container">
      <div id="player-left">
        <div class="custom-audio-player">
          <button id="play-button" aria-label="Pause" class="icon-button">
            ❚❚
          </button>

          <div class="volume-wrapper">
            <button id="volume-button" aria-label="Volume" class="icon-button">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="black"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon points="5 9 9 9 13 5 13 19 9 15 5 15 5 9"></polygon>
                <path d="M15 9.354a4 4 0 0 1 0 5.292"></path>
                <path d="M17.5 7a7 7 0 0 1 0 10"></path>
              </svg>
            </button>
            <div class="volume-slider-container">
              <input
                type="range"
                id="volume-slider"
                min="0"
                max="1"
                step="0.01"
                value="1"
              />
            </div>
          </div>
        </div>

        <div id="TitleContainer">
          <div id="flexcontainer">
            <strong>Song:</strong>
            <div id="scroll-container">
              <div id="scroll-text">
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <img id="albumart" src="../default-art.jpg" alt="Album Art" />
    </div>

    <audio id="audioplayer" autoplay preload="none">
      <source src="https://music.pixelhumble.com/lilly" type="audio/mpeg" />
    </audio>

    <script src="../songtitle.js"></script>
    <script>
      const audio = document.getElementById("audioplayer");
      const playBtn = document.getElementById("play-button");
      const volumeBtn = document.getElementById("volume-button");
      const volumeSlider = document.getElementById("volume-slider");
      const volumeContainer = document.querySelector(
        ".volume-slider-container"
      );
      const overlay = document.getElementById("startup-overlay");
      const message = document.getElementById("startup-message");
      const spinner = document.getElementById("loading-spinner");
      const playerContainer = document.getElementById("player-container");
      const albumArt = document.getElementById("albumart");
      const titleBlock = document.getElementById("TitleContainer");

      audio.volume = 1;
      volumeSlider.value = 1;
      playBtn.textContent = "▶";

      function fadeInUI() {
        overlay.classList.add("hidden");
        playerContainer.classList.add("visible");
        titleBlock.classList.add("visible");
        albumArt.classList.add("visible");
      }

      function startStream() {
        message.textContent = "Loading stream...";
        spinner.classList.add("visible");

        audio
          .play()
          .then(() => {
            playBtn.textContent = "❚❚";
            fadeInUI();
          })
          .catch((err) => {
            console.warn("Stream play failed:", err);
            message.textContent = "Click to try again";
            spinner.classList.remove("visible");
          });
      }

      overlay.addEventListener("click", startStream);

      playBtn.addEventListener("click", () => {
        if (audio.paused) {
          startStream();
        } else {
          audio.pause();
          playBtn.textContent = "▶";
        }
      });

      volumeBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        volumeContainer.classList.toggle("visible");
      });

      volumeSlider.addEventListener("input", () => {
        audio.volume = volumeSlider.value;
      });

      document.addEventListener("click", (e) => {
        if (
          !volumeContainer.contains(e.target) &&
          !volumeBtn.contains(e.target)
        ) {
          volumeContainer.classList.remove("visible");
        }
      });
    </script>
  </body>
</html>
