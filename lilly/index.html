<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <link
      rel="icon"
      type="image/png"
      href="../favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="shortcut icon" href="../favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="/MyWebSite" />
    <link rel="manifest" href="../site.webmanifest" />
  </head>
  <body>
    <div id="copy-tooltip">Copied!</div>

    <div id="player-container">
      <div id="player-left">
        <div class="custom-audio-player">
          <button id="play-button" aria-label="Pause" class="icon-button">
            ❚❚
          </button>

          <div class="volume-wrapper">
            <button id="volume-button" aria-label="Volume" class="icon-button">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="black"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon points="5 9 9 9 13 5 13 19 9 15 5 15 5 9"></polygon>
                <path d="M15 9.354a4 4 0 0 1 0 5.292"></path>
                <path d="M17.5 7a7 7 0 0 1 0 10"></path>
              </svg>
            </button>
            <div class="volume-slider-container">
              <input
                type="range"
                id="volume-slider"
                min="0"
                max="1"
                step="0.01"
                value="1"
              />
            </div>
          </div>
        </div>

        <div id="TitleContainer">
          <div id="flexcontainer">
            <strong>Song:</strong>
            <div id="scroll-container">
              <div id="scroll-text">
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
                <span class="spacer">&nbsp;&nbsp;&nbsp;</span>
                <span class="scroll-title">LOADING...</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <img id="albumart" src="../default-art.jpg" alt="Album Art" />
    </div>

    <audio id="audioplayer" autoplay preload="none">
      <source src="https://music.pixelhumble.com/lilly" type="audio/mpeg" />
    </audio>

    <script src="../songtitle.js"></script>
    <script>
      const audio = document.getElementById("audioplayer");
      const playBtn = document.getElementById("play-button");
      const volumeBtn = document.getElementById("volume-button");
      const volumeSlider = document.getElementById("volume-slider");
      const volumeContainer = document.querySelector(
        ".volume-slider-container"
      );

      // Set initial volume
      audio.volume = 1;
      volumeSlider.value = 1;

      function updatePlayButton() {
        playBtn.textContent = audio.paused ? "▶" : "❚❚";
      }

      // Attempt autoplay once user interacts
      function tryAutoplay() {
        audio
          .play()
          .then(() => {
            updatePlayButton();
          })
          .catch((err) => {
            console.warn("Autoplay blocked:", err);
            updatePlayButton(); // reflect paused state
          });
      }

      // Try autoplay when page loads (some browsers allow it if muted)
      tryAutoplay();

      // Retry on user click anywhere
      document.addEventListener("click", function onceUserInteracts() {
        tryAutoplay();
        document.removeEventListener("click", onceUserInteracts);
      });

      playBtn.addEventListener("click", () => {
        if (audio.paused) {
          audio.play().then(updatePlayButton);
        } else {
          audio.pause();
          updatePlayButton();
        }
      });

      // Toggle volume slider
      volumeBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        volumeContainer.classList.toggle("visible");
      });

      // Adjust volume
      volumeSlider.addEventListener("input", () => {
        audio.volume = volumeSlider.value;
      });

      // Hide volume slider on outside click
      document.addEventListener("click", (e) => {
        if (
          !volumeContainer.contains(e.target) &&
          !volumeBtn.contains(e.target)
        ) {
          volumeContainer.classList.remove("visible");
        }
      });
    </script>
  </body>
</html>
